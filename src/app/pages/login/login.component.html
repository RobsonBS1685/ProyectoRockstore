<section class="py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-md-8 col-lg-5">
      <div class="card border-0 shadow-lg p-4"
             style="background: rgba(0, 0, 0, 0.65);">
          <div class="text-center mb-4">
            <div
              class="rounded-circle bg-danger bg-opacity-25 d-flex align-items-center justify-content-center mx-auto mb-3"
              style="width: 88px; height: 88px;"
            >
              <i class="bi bi-lightning-charge-fill text-danger" style="font-size: 2.5rem"></i>
            </div>
            <h2 class="fw-bold text-uppercase text-white mb-2">
              Rock<span class="text-danger">Store</span>
            </h2>
            <p class="text-secondary mb-0">
              Ingresá con tus credenciales para entrar al panel.
            </p>
          </div>

          <div class="alert alert-danger rounded-3 mb-3" *ngIf="errorMessage">
            {{ errorMessage }}
          </div>

          <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>
            <div class="mb-3">
              <label for="usuario" class="form-label text-light">Usuario</label>
              <input
                id="usuario"
                type="text"
                class="form-control bg-dark text-light border-secondary"
                formControlName="usuario"
                placeholder="Ingresá tu usuario"
                maxlength="100"
                [class.is-invalid]="f['usuario'].invalid && f['usuario'].touched"
              />
              <div class="invalid-feedback" *ngIf="f['usuario'].errors?.['required'] && f['usuario'].touched">
                El usuario es obligatorio.
              </div>
            </div>

            <div class="mb-4">
              <label for="password" class="form-label text-light">Contraseña</label>
              <input
                id="password"
                type="password"
                class="form-control bg-dark text-light border-secondary"
                formControlName="password"
                placeholder="Ingresá tu contraseña"
                maxlength="100"
                [class.is-invalid]="f['password'].invalid && f['password'].touched"
              />
              <div class="invalid-feedback" *ngIf="f['password'].errors?.['required'] && f['password'].touched">
                La contraseña es obligatoria.
              </div>
            </div>

            <button type="submit" class="btn btn-danger w-100 py-2 rounded-3 fw-semibold">
              <i class="bi bi-box-arrow-in-right me-2"></i>Ingresar
            </button>
          </form>

          <div class="text-center mt-3">
            <small class="text-secondary">
              Credenciales de prueba:
              <span class="text-light">admin</span> / <span class="text-light">1234</span>
            </small>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
