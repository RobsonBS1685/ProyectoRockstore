<nav class="navbar navbar-dark bg-dark border-bottom border-danger fixed-top">
  <div class="container-fluid">
    <span class="navbar-brand mb-0 h1 fw-bold text-uppercase">
      <i class="bi bi-lightning-charge-fill text-danger me-1"></i>
      Rock<span class="text-danger">Store</span>
    </span>
  </div>
</nav>

<section class="py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-md-8 col-lg-5">
<div

  class="card border-0 shadow-lg p-4"
  style="background: rgba(0, 0, 0, 0.65);">
          
            <div class="text-center mb-4">
            <div class="rounded-circle bg-danger bg-opacity-25 d-flex align-items-center justify-content-center mx-auto"
                style="width: 100px; height: 100px;">
              <i class="bi bi-lightning-charge-fill text-danger fs-1"></i>
            </div>
            <h2 class="fw-bold text-uppercase text-white mb-2">Rock<span class="text-danger">Store</span></h2>
            <p class="text-secondary mb-0">Accedé al panel de tu tienda rock con tus credenciales.</p>
          </div>

<div style="min-height: 45px;">
  <div class="alert alert-danger rounded-3 mb-0" *ngIf="errorMessage">
    {{ errorMessage }}
  </div>
</div>

          <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>
            <div class="mb-3">
              <label for="usuario" class="form-label text-light">Usuario</label>
              <input
                id="usuario"
                type="text"
                class="form-control bg-dark text-light border-secondary"
                formControlName="usuario"
                placeholder="admin"
                maxlength="100" 
                [class.is-invalid]="f['usuario'].invalid && f['usuario'].touched"
              />
              <div class="invalid-feedback" *ngIf="f['usuario'].errors?.['required'] && f['usuario'].touched">
                El usuario es obligatorio.
              </div>
            </div>

            <div class="mb-4">
              <label for="password" class="form-label text-light">Contraseña</label>
              <input
                id="password"
                type="password"
                class="form-control bg-dark text-light border-secondary"
                formControlName="password"
                placeholder="1234"
                maxlength="100" 
                [class.is-invalid]="f['password'].invalid && f['password'].touched"
              />
              <div class="invalid-feedback" *ngIf="f['password'].errors?.['required'] && f['password'].touched">
                La contraseña es obligatoria.
              </div>
            </div>

            <button type="submit" class="btn btn-danger w-100 py-2 rounded-3 fw-semibold">
              <i class="bi bi-box-arrow-in-right me-2"></i>Ingresar
            </button>
          </form>

          <div class="text-center mt-3">
            <small class="text-secondary">Credenciales de prueba: admin / 1234</small>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>



<footer class="login-footer bg-dark border-top border-danger">
  <div class="container text-center py-3">
    <small class="text-secondary">
      ©2026 <strong class="text-danger">Rock Store</strong>. Todos los derechos reservados.
    </small>
  </div>
</footer>
