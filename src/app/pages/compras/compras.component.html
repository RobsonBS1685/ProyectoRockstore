<section class="container py-5">
  <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4 gap-3">
    <h2 class="fw-bold text-uppercase mb-0">
      Mis <span class="text-danger">Compras</span>
    </h2>
    <button class="btn btn-outline-light rounded-3" (click)="vaciarTodo()" [disabled]="compras.length === 0">
      <i class="bi bi-trash3-fill me-1"></i>Vaciar Compras
    </button>
  </div>

  <!-- Estado vacío -->
  <div class="alert alert-secondary text-center py-5" role="alert" *ngIf="compras.length === 0">
    <i class="bi bi-inbox fs-1 d-block mb-2"></i>
    No existen compras registradas.
  </div>

  <!-- Tabla de compras -->
  <div class="table-responsive card bg-dark border-secondary rounded-3 p-2" *ngIf="compras.length > 0">
    <table class="table table-dark table-hover align-middle mb-0">
      <thead>
        <tr class="text-uppercase">
          <th>Producto</th>
          <th>Cantidad</th>
          <th>Dirección</th>
          <th>Email</th>
          <th class="text-end">Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let c of compras">
          <td>{{ c.producto }}</td>
          <td><span class="badge bg-danger">{{ c.cantidad }}</span></td>
          <td>{{ c.direccion }}</td>
          <td>{{ c.email }}</td>
          <td class="text-end">
            <button class="btn btn-sm btn-outline-danger rounded-3" (click)="eliminar(c.id)">
              <i class="bi bi-trash3"></i> Eliminar
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</section>
